<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анонимный опрос</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0e1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: #141b2b;
            border-radius: 40px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .host-container {
            max-width: 900px;
            width: 100%;
            background: #141b2b;
            border-radius: 40px;
            padding: 32px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        h1 {
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #8892b0;
            font-size: 14px;
            margin-bottom: 28px;
            border-bottom: 1px solid #1e2a3a;
            padding-bottom: 16px;
        }
        .question-text {
            font-size: 22px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 32px;
            min-height: 70px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 28px;
        }
        .option-btn {
            background: #1e2a3a;
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 20px 24px;
            font-size: 18px;
            font-weight: 500;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
        }
        .option-btn .letter {
            background: #2d3b4f;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #a78bfa;
            flex-shrink: 0;
        }
        .option-btn:hover:not(.voted) {
            border-color: #4a3f6b;
        }
        .option-btn.selected {
            border-color: #7c3aed;
            background: #1f1a3a;
            box-shadow: 0 0 30px rgba(124,58,237,0.15);
        }
        .option-btn.voted {
            opacity: 0.5;
            pointer-events: none;
            border-color: #2d3b4f;
        }
        .option-btn .check {
            margin-left: auto;
            font-size: 22px;
            opacity: 0;
            transition: 0.2s;
        }
        .option-btn.selected .check {
            opacity: 1;
            color: #7c3aed;
        }
        .waiting-status {
            text-align: center;
            padding: 18px;
            background: #1a2335;
            border-radius: 16px;
            color: #94a3b8;
            font-size: 15px;
            margin-top: 12px;
            border: 1px dashed #2d3b4f;
            display: none;
        }
        .waiting-status.active {
            display: block;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .waiting-status span {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #7c3aed;
            border-radius: 50%;
            margin-right: 10px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin: 20px 0 32px;
        }
        .stat-card {
            background: #1a2335;
            border-radius: 28px;
            padding: 24px 20px 30px;
            text-align: center;
            border: 1px solid #252f45;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .stat-card .label {
            font-size: 16px;
            color: #8892b0;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 64px;
            font-weight: 700;
            line-height: 1;
        }
        .stat-card .percent {
            font-size: 20px;
            color: #94a3b8;
            margin-top: 6px;
        }
        .stat-card.option-a .value { color: #60a5fa; }
        .stat-card.option-b .value { color: #f472b6; }
        .stat-card .bar-bg {
            width: 100%;
            height: 8px;
            background: #0b0e1a;
            border-radius: 10px;
            margin-top: 16px;
            overflow: hidden;
        }
        .stat-card .bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: linear-gradient(90deg, #60a5fa, #3b82f6);
        }
        .stat-card.option-b .bar-fill {
            background: linear-gradient(90deg, #f472b6, #ec4899);
        }
        .stat-card.pop {
            animation: pop 0.5s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.95); }
            40% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
        .host-controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .btn-primary {
            background: #7c3aed;
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 160px;
            box-shadow: 0 8px 30px rgba(124,58,237,0.3);
        }
        .btn-primary:active {
            transform: scale(0.96);
        }
        .btn-secondary {
            background: #1e2a3a;
            border: 1px solid #2d3b4f;
            padding: 16px 30px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            color: #c8d0e0;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 120px;
        }
        .btn-secondary:active {
            transform: scale(0.96);
        }
        .qr-hint {
            background: #0f1625;
            border-radius: 16px;
            padding: 14px 20px;
            margin-top: 20px;
            font-size: 14px;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px dashed #1e2a3a;
            word-break: break-all;
            flex-wrap: wrap;
        }
        .qr-hint code {
            color: #a78bfa;
            background: #1a1f30;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 13px;
            flex: 1;
        }
        .vote-count-badge {
            font-size: 14px;
            color: #64748b;
            text-align: center;
            margin: 12px 0 8px;
        }
        .host-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .status-badge {
            background: #1e2a3a;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 14px;
            color: #94a3b8;
            white-space: nowrap;
        }
        .status-badge.active {
            background: #2d1b4a;
            color: #a78bfa;
        }
        .hidden {
            display: none !important;
        }
        .error-msg {
            background: #2d1b1b;
            border: 1px solid #5c2a2a;
            color: #f87171;
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
            text-align: center;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .container, .host-container {
                padding: 24px 16px;
                border-radius: 28px;
            }
            .stat-card .value {
                font-size: 48px;
            }
            .stats-grid {
                gap: 16px;
            }
            .host-controls {
                flex-direction: column;
            }
            .btn-primary, .btn-secondary {
                width: 100%;
                text-align: center;
            }
            .question-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<!-- СТРАНИЦА УЧАСТНИКА -->
<div id="voterApp" class="container">
    <h1>📊 Опрос</h1>
    <div class="subtitle">Анонимно · 1 вопрос</div>
    <div id="questionDisplay" class="question-text">Какой вариант вы выбираете?</div>
    <div class="options">
        <button class="option-btn" data-option="A" id="optA">
            <span class="letter">A</span>
            <span id="optALabel">Синий — путь инноваций</span>
            <span class="check">✓</span>
        </button>
        <button class="option-btn" data-option="B" id="optB">
            <span class="letter">B</span>
            <span id="optBLabel">Розовый — путь гармонии</span>
            <span class="check">✓</span>
        </button>
    </div>
    <div id="waitingStatus" class="waiting-status">
        <span></span> Ожидаем, пока ведущий откроет следующий вопрос...
    </div>
    <div id="voterError" class="error-msg hidden"></div>
</div>

<!-- ПАНЕЛЬ ВЕДУЩЕГО -->
<div id="hostApp" class="host-container hidden">
    <div class="host-title">
        <div>
            <h1>🎯 Панель ведущего</h1>
            <div class="subtitle">Управление опросом в реальном времени</div>
        </div>
        <div id="hostStatusBadge" class="status-badge">● Загрузка...</div>
    </div>
    <div class="vote-count-badge" id="totalVotesDisplay">Всего голосов: 0</div>
    <div class="stats-grid">
        <div class="stat-card option-a" id="statA">
            <div class="label">Вариант А</div>
            <div class="value" id="statAValue">0</div>
            <div class="percent" id="statAPercent">0%</div>
            <div class="bar-bg"><div class="bar-fill" id="statABar" style="width:0%"></div></div>
        </div>
        <div class="stat-card option-b" id="statB">
            <div class="label">Вариант Б</div>
            <div class="value" id="statBValue">0</div>
            <div class="percent" id="statBPercent">0%</div>
            <div class="bar-bg"><div class="bar-fill" id="statBBar" style="width:0%"></div></div>
        </div>
    </div>
    <div class="host-controls">
        <button class="btn-primary" id="nextBtn">▶ Следующий вопрос</button>
        <button class="btn-secondary" id="resetBtn">⟳ Сбросить</button>
    </div>
    <div id="hostError" class="error-msg hidden"></div>
    <div class="qr-hint">
        🔗 Ссылка для участников:
        <code id="voterLinkDisplay">/</code>
    </div>
</div>

<script>
    // ===== НАСТРОЙКА JSONBIN.IO =====
    // Зарегистрируйтесь на https://jsonbin.io
    // Создайте бин с данными: { "votes": { "A": 0, "B": 0 }, "isVotingOpen": false, "round": 0 }
    // Вставьте ваши данные ниже:
    
    const JSONBIN_CONFIG = {
        BIN_ID: 'ВАШ_BIN_ID',    // <<<< ВСТАВЬТЕ СЮДА
        API_KEY: 'ВАШ_API_КЛЮЧ', // <<<< ВСТАВЬТЕ СЮДА
    };

    const CONFIG = {
        question: 'Какой вариант вы выбираете?',
        optionA: 'Синий — путь инноваций',
        optionB: 'Розовый — путь гармонии',
    };

    // ===== КОД РАБОТЫ С JSONBIN =====
    const API_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.BIN_ID}`;

    async function loadState() {
        const res = await fetch(API_URL, {
            headers: { 'X-Master-Key': JSONBIN_CONFIG.API_KEY }
        });
        if (!res.ok) throw new Error('Ошибка загрузки');
        const data = await res.json();
        return data.record;
    }

    async function saveState(state) {
        const res = await fetch(API_URL, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': JSONBIN_CONFIG.API_KEY,
            },
            body: JSON.stringify(state)
        });
        if (!res.ok) throw new Error('Ошибка сохранения');
        return await res.json();
    }

    // ===== ГЛОБАЛЬНОЕ СОСТОЯНИЕ =====
    let state = { votes: { A: 0, B: 0 }, isVotingOpen: false, round: 0 };
    let isHost = false;
    let votedRound = null;

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    const urlParams = new URLSearchParams(window.location.search);
    isHost = urlParams.has('host');

    if (isHost) {
        document.getElementById('voterApp').classList.add('hidden');
        document.getElementById('hostApp').classList.remove('hidden');
        document.getElementById('voterLinkDisplay').textContent = window.location.href.split('?')[0];
        initHost();
    } else {
        document.getElementById('voterApp').classList.remove('hidden');
        document.getElementById('hostApp').classList.add('hidden');
        initVoter();
    }

    // ===== ВЕДУЩИЙ =====
    async function initHost() {
        try {
            state = await loadState();
            renderHost();
        } catch (e) {
            showError('hostError', '❌ Ошибка загрузки. Проверьте настройки JSONBin.');
        }

        document.getElementById('nextBtn').addEventListener('click', async () => {
            try {
                if (state.isVotingOpen) {
                    state.isVotingOpen = false;
                } else {
                    state.votes = { A: 0, B: 0 };
                    state.isVotingOpen = true;
                    state.round = (state.round || 0) + 1;
                }
                await saveState(state);
                renderHost();
            } catch (e) {
                showError('hostError', '❌ Ошибка сохранения');
            }
        });

        document.getElementById('resetBtn').addEventListener('click', async () => {
            if (!confirm('Сбросить все голоса?')) return;
            state.votes = { A: 0, B: 0 };
            state.isVotingOpen = false;
            state.round = (state.round || 0) + 1;
            await saveState(state);
            renderHost();
        });

        setInterval(async () => {
            try {
                const newState = await loadState();
                if (JSON.stringify(newState) !== JSON.stringify(state)) {
                    state = newState;
                    renderHost();
                }
            } catch (e) {}
        }, 2000);
    }

    function renderHost() {
        const votes = state.votes || { A: 0, B: 0 };
        const total = votes.A + votes.B;
        document.getElementById('totalVotesDisplay').textContent = `Всего голосов: ${total}`;
        document.getElementById('statAValue').textContent = votes.A;
        document.getElementById('statBValue').textContent = votes.B;
        const pA = total === 0 ? 0 : Math.round((votes.A / total) * 100);
        const pB = total === 0 ? 0 : Math.round((votes.B / total) * 100);
        document.getElementById('statAPercent').textContent = pA + '%';
        document.getElementById('statBPercent').textContent = pB + '%';
        document.getElementById('statABar').style.width = pA + '%';
        document.getElementById('statBBar').style.width = pB + '%';

        const badge = document.getElementById('hostStatusBadge');
        const btn = document.getElementById('nextBtn');
        if (state.isVotingOpen) {
            badge.textContent = '● Голосование открыто';
            badge.className = 'status-badge active';
            btn.textContent = '⏸ Закрыть и показать статистику';
        } else {
            badge.textContent = '● Голосование закрыто';
            badge.className = 'status-badge';
            btn.textContent = '▶ Следующий вопрос';
        }
        document.getElementById('statA').classList.remove('pop');
        document.getElementById('statB').classList.remove('pop');
        void document.getElementById('statA').offsetWidth;
        document.getElementById('statA').classList.add('pop');
        document.getElementById('statB').classList.add('pop');
    }

    // ===== УЧАСТНИК =====
    async function initVoter() {
        try {
            state = await loadState();
            renderVoter();
        } catch (e) {
            showError('voterError', '❌ Ошибка загрузки опроса');
        }

        document.getElementById('optA').addEventListener('click', () => handleVote('A'));
        document.getElementById('optB').addEventListener('click', () => handleVote('B'));

        setInterval(async () => {
            try {
                const newState = await loadState();
                if (JSON.stringify(newState) !== JSON.stringify(state)) {
                    state = newState;
                    renderVoter();
                }
            } catch (e) {}
        }, 2000);
    }

    function renderVoter() {
        document.getElementById('questionDisplay').textContent = CONFIG.question;
        document.getElementById('optALabel').textContent = CONFIG.optionA;
        document.getElementById('optBLabel').textContent = CONFIG.optionB;

        const isOpen = state.isVotingOpen;
        const currentRound = state.round || 0;
        const optA = document.getElementById('optA');
        const optB = document.getElementById('optB');
        const waitingStatus = document.getElementById('waitingStatus');

        if (!isOpen) {
            waitingStatus.classList.add('active');
            optA.classList.add('voted');
            optB.classList.add('voted');
            optA.classList.remove('selected');
            optB.classList.remove('selected');
            if (votedRound !== currentRound) {
                optA.classList.remove('voted');
                optB.classList.remove('voted');
                votedRound = null;
            }
            return;
        }

        waitingStatus.classList.remove('active');
        if (votedRound !== currentRound) {
            votedRound = null;
            optA.classList.remove('voted', 'selected');
            optB.classList.remove('voted', 'selected');
        }
        if (votedRound === currentRound) {
            optA.classList.add('voted');
            optB.classList.add('voted');
        } else {
            optA.classList.remove('voted');
            optB.classList.remove('voted');
        }
    }

    async function handleVote(option) {
        if (!state.isVotingOpen) {
            showError('voterError', '⏳ Голосование закрыто');
            return;
        }
        if (votedRound === state.round) {
            showError('voterError', '✅ Вы уже проголосовали');
            return;
        }
        try {
            const fresh = await loadState();
            if (!fresh.isVotingOpen || fresh.round !== state.round) {
                showError('voterError', '⏳ Состояние изменилось');
                return;
            }
            fresh.votes[option] = (fresh.votes[option] || 0) + 1;
            await saveState(fresh);
            state = fresh;
            votedRound = state.round;
            
            const optA = document.getElementById('optA');
            const optB = document.getElementById('optB');
            document.querySelectorAll('.option-btn').forEach(el => el.classList.remove('selected'));
            if (option === 'A') {
                optA.classList.add('selected');
                optA.classList.add('voted');
                optB.classList.add('voted');
            } else {
                optB.classList.add('selected');
                optB.classList.add('voted');
                optA.classList.add('voted');
            }
            const ws = document.getElementById('waitingStatus');
            ws.classList.add('active');
            ws.innerHTML = '<span></span> Спасибо! Ожидаем следующий вопрос...';
        } catch (e) {
            showError('voterError', '❌ Ошибка голосования');
        }
    }

    function showError(id, msg) {
        const el = document.getElementById(id);
        if (el) {
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 5000);
        }
    }

    // Проверка настройки JSONBin
    if (JSONBIN_CONFIG.BIN_ID === 'ВАШ_BIN_ID' || JSONBIN_CONFIG.API_KEY === 'ВАШ_API_КЛЮЧ') {
        document.body.innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;min-height:100vh;background:#0b0e1a;color:#fff;padding:20px;text-align:center;">
                <div style="max-width:500px;background:#141b2b;padding:40px;border-radius:20px;">
                    <h2 style="color:#f87171;">⚠️ Настройте JSONBin</h2>
                    <p style="color:#94a3b8;margin:20px 0;">
                        Получите BIN_ID и API_KEY на <a href="https://jsonbin.io" target="_blank" style="color:#a78bfa;">jsonbin.io</a>
                    </p>
                    <pre style="background:#0b0e1a;padding:16px;border-radius:12px;text-align:left;font-size:12px;color:#8892b0;">
const JSONBIN_CONFIG = {
    BIN_ID: 'ваш_бин_id',
    API_KEY: 'ваш_api_ключ',
};</pre>
                </div>
            </div>
        `;
    }
</script>
</body>
</html>
